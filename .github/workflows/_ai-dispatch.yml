name: AI Agent Dispatch (reusable)

on:
  workflow_call:
    inputs:
      agent:
        description: "Agent to run (planner, architect, implementer, reviewer, revise)"
        required: true
        type: string
      issue-number:
        description: "GitHub issue number this run targets"
        required: false
        type: string
      pr-number:
        description: "GitHub pull request number this run targets"
        required: false
        type: string
      comment-id:
        description: "GitHub comment id that triggered a slash command"
        required: false
        type: string
      provider:
        description: "LLM provider used by the agent runtime (anthropic, openai, google, groq, ...)"
        required: false
        type: string
        default: ""
    secrets:
      AI_GITHUB_TOKEN:
        description: "Token with issues/pr/contents scopes"
        required: true
      OPENCODE_API_KEY:
        description: "Provider API key (ANTHROPIC_API_KEY, OPENAI_API_KEY, ...) — reused by the runtime"
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: read

concurrency:
  group: ai-${{ inputs.agent }}-${{ inputs.issue-number || inputs.pr-number || github.run_id }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Resolve PR head ref
        id: prref
        if: ${{ inputs.pr-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          PR: ${{ inputs.pr-number }}
        run: |
          # When continuing on an existing PR, check out its branch directly so
          # the agent can never create a parallel branch. Falls back to empty
          # (default branch) if resolution fails.
          REF=$(gh pr view "$PR" --json headRefName -q '.headRefName' 2>/dev/null || true)
          echo "ref=${REF:-}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ steps.prref.outputs.ref }}
          token: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Setup PHP (for Laravel context)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer
        continue-on-error: true

      - name: Resolve configuration
        id: cfg
        run: |
          RUNTIME=$(node -e "try{const c=require('fs').readFileSync('.ai/config.yml','utf8');const m=c.match(/agent_runtime:\s*(\w+)/);console.log(m?m[1]:'opencode')}catch(e){console.log('opencode')}")
          PROVIDER=$(node -e "try{const c=require('fs').readFileSync('.ai/config.yml','utf8');const m=c.match(/provider:\s*(\S+)/);console.log(m?m[1]:'anthropic')}catch(e){console.log('anthropic')}")
          # CLI input overrides config when explicitly provided.
          if [ -n "${{ inputs.provider }}" ]; then PROVIDER="${{ inputs.provider }}"; fi
          # Claude Code is Anthropic-only, so force the provider for auth + model.
          if [ "$RUNTIME" = "claude" ]; then PROVIDER="anthropic"; fi
          echo "runtime=${RUNTIME}"
          echo "provider=${PROVIDER}"
          echo "runtime=${RUNTIME}" >> "$GITHUB_OUTPUT"
          echo "provider=${PROVIDER}" >> "$GITHUB_OUTPUT"

      - name: Install agent runtime
        run: |
          set -euo pipefail
          if [ "${{ steps.cfg.outputs.runtime }}" = "claude" ]; then
            echo "Installing Claude Code via npm..."
            npm install --no-save @anthropic-ai/claude-code >/dev/null 2>&1 || true
            BIN_DIR="$PWD/node_modules/.bin"
          else
            echo "Installing OpenCode via official installer..."
            curl -fsSL https://opencode.ai/install | bash -s -- --no-modify-path
            BIN_DIR="$HOME/.opencode/bin"
          fi
          # Register for this and later steps (GITHUB_PATH applies to the next
          # step, so also export PATH locally for the verification below).
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          export PATH="$BIN_DIR:$PATH"
          # Surface what we ended up with (and fail the step loudly if missing).
          if command -v opencode >/dev/null 2>&1; then
            echo "opencode: $(opencode --version 2>/dev/null || echo present)"
          elif command -v claude >/dev/null 2>&1; then
            echo "claude: present"
          else
            echo "::error::No agent runtime (opencode/claude) found on PATH after install."
            exit 1
          fi

      - name: Configure provider credentials
        env:
          PROVIDER: ${{ steps.cfg.outputs.provider }}
          PROVIDER_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          if [ -z "${PROVIDER_KEY:-}" ]; then
            echo "::warning::No provider API key supplied (secret OPENCODE_API_KEY). The agent cannot authenticate and will fail."
          else
            echo "::add-mask::${PROVIDER_KEY}"
            case "$PROVIDER" in
              # OpenCode's own hosted providers (Zen / Go). The exact env var
              # varies by catalog (OPENCODE_API_KEY, OPENCODE_GO_API_KEY, …), so
              # export every plausible name from the single OPENCODE_API_KEY secret.
              opencode|opencode-go|opencode-zen|zen)
                echo "OPENCODE_API_KEY=${PROVIDER_KEY}" >> "$GITHUB_ENV"
                echo "OPENCODE_GO_API_KEY=${PROVIDER_KEY}" >> "$GITHUB_ENV"
                echo "OPENCODE_ZEN_API_KEY=${PROVIDER_KEY}" >> "$GITHUB_ENV"
                echo "Exported OpenCode hosted key (OPENCODE_API_KEY / OPENCODE_GO_API_KEY / OPENCODE_ZEN_API_KEY)"
                ;;
              *)
                # Map the provider to the env var OpenCode actually reads
                # (it does NOT read OPENCODE_API_KEY — it reads the provider key).
                KEYVAR=$(node -e "const p=(process.env.PROVIDER||'anthropic').toLowerCase();const m={anthropic:'ANTHROPIC_API_KEY',openai:'OPENAI_API_KEY',google:'GEMINI_API_KEY',gemini:'GEMINI_API_KEY',groq:'GROQ_API_KEY',openrouter:'OPENROUTER_API_KEY',deepseek:'DEEPSEEK_API_KEY',mistral:'MISTRAL_API_KEY',xai:'XAI_API_KEY'};console.log(m[p]||(p.toUpperCase()+'_API_KEY'))")
                echo "${KEYVAR}=${PROVIDER_KEY}" >> "$GITHUB_ENV"
                echo "Exported provider key as ${KEYVAR}"
                ;;
            esac
          fi

      - name: Configure git identity
        run: |
          git config user.name "crewflow[bot]"
          git config user.email "crewflow[bot]@users.noreply.github.com"

      - name: Collect repository context
        id: context
        env:
          AI_AGENT: ${{ inputs.agent }}
          AI_ISSUE_NUMBER: ${{ inputs.issue-number }}
          AI_PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          npx tsx .github/scripts/collect-context.ts || true
          echo "context-file=.ai/context/latest.json" >> "$GITHUB_OUTPUT"

      - name: Resolve model from config
        id: model
        # resolve-model.mjs prints "model=<value>"; forward that line to
        # $GITHUB_OUTPUT so the Run agent step can read steps.model.outputs.model.
        run: echo "$(node .github/scripts/resolve-model.mjs "${{ inputs.agent }}" "${{ steps.cfg.outputs.provider }}" "${{ steps.cfg.outputs.runtime }}")" >> "$GITHUB_OUTPUT"

      - name: Run agent
        id: agent
        env:
          GITHUB_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          AI_AGENT: ${{ inputs.agent }}
          AI_ISSUE_NUMBER: ${{ inputs.issue-number }}
          AI_PR_NUMBER: ${{ inputs.pr-number }}
          AI_COMMENT_ID: ${{ inputs.comment-id }}
          AI_MODEL: ${{ steps.model.outputs.model }}
          AI_CONTEXT_FILE: ${{ steps.context.outputs.context-file }}
          AI_PROMPT: .github/prompts/${{ inputs.agent }}.md
          AI_PROVIDER: ${{ steps.cfg.outputs.provider }}
          AI_RUNTIME: ${{ steps.cfg.outputs.runtime }}
          # Avoid the freshly installed binary trying to self-update in CI.
          OPENCODE_DISABLE_AUTOUPDATE: "true"
        run: node .github/scripts/run-agent.mjs

      - name: Persist agent artifacts
        # Analysis agents write .ai/plans etc. that downstream agents
        # (architect, implementer) need. They run in separate runners with
        # fresh checkouts, so commit the outputs back to the default branch.
        if: ${{ inputs.agent == 'planner' || inputs.agent == 'architect' || inputs.agent == 'revise' }}
        env:
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git add .ai/plans .ai/architecture .ai/memory || true
          if git diff --cached --quiet; then
            echo "No agent artifacts to persist."
            exit 0
          fi
          git config user.name "crewflow[bot]"
          git config user.email "crewflow[bot]@users.noreply.github.com"
          git commit -m "docs(ai): update ${{ inputs.agent }} output for #${{ inputs.issue-number || inputs.pr-number }}"
          # Rebase onto the latest default branch so the push is a fast-forward
          # even if main moved while the agent was running.
          git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)" 2>&1 || true
          git push origin HEAD

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-${{ inputs.agent }}-${{ inputs.issue-number || inputs.pr-number || github.run_id }}
          path: |
            .ai/plans/
            .ai/context/
            .ai/architecture/
            .ai/memory/
          if-no-files-found: ignore
