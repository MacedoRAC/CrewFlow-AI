name: Issue Analysis

on:
  issues:
    types: [opened, edited, reopened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: read

concurrency:
  group: issue-analysis-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  authorize:
    if: >-
      # Labels are PURE STATUS MARKERS written by the `label` job — they
      # must never re-trigger the agents (that would loop planner+architect
      # every time the `label` job advances the issue). Only act on the
      # initial triggers: a fresh/ edited issue, an explicit /analyze, or a
      # manual `needs-analysis` tag.
      (github.event_name == 'issues' && github.event.action != 'labeled' && github.event.issue.state == 'open') ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'needs-analysis') ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request == null &&
        startsWith(github.event.comment.body, '/analyze'))
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.extract.outputs.issue-number }}
      comment-id: ${{ steps.extract.outputs.comment-id }}
    steps:
      - id: extract
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          echo "issue-number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "comment-id=${COMMENT_ID}" >> "$GITHUB_OUTPUT"

  analyze:
    needs: authorize
    uses: ./.github/workflows/_ai-dispatch.yml
    with:
      agent: planner
      issue-number: ${{ needs.authorize.outputs.issue-number }}
      comment-id: ${{ needs.authorize.outputs.comment-id }}
    secrets:
      AI_GITHUB_TOKEN: ${{ secrets.AI_GITHUB_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

  architect:
    needs: analyze
    uses: ./.github/workflows/_ai-dispatch.yml
    with:
      agent: architect
      issue-number: ${{ needs.authorize.outputs.issue-number }}
    secrets:
      AI_GITHUB_TOKEN: ${{ secrets.AI_GITHUB_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

  label:
    needs: [authorize, analyze, architect]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Apply labels
        env:
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.authorize.outputs.issue-number }}
          GH_REPO: ${{ github.repository }}
          GH_REF: ${{ github.ref_name }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-label "needs-analysis" || true
          gh issue edit "$ISSUE_NUMBER" --add-label "analysis-complete" || true
          # Grab the Architect's verdict from the last workflow run's architect
          # job (the one-liner it prints at the end) to decide the label.
          VERDICT=$(gh run list --repo "$GH_REPO" --workflow "Issue Analysis" \
                        --branch "$GH_REF" --limit 1 --json databaseId \
                        --jq '.[0].databaseId' 2>/dev/null \
                      | xargs -I{} gh run view {} --log 2>/dev/null \
                      | grep -oE '(✅ Approved — ready for /implement|⚠️ Changes requested)' \
                      | tail -1 || true)
          if [ "$VERDICT" = "⚠️ Changes requested" ]; then
            gh issue edit "$ISSUE_NUMBER" --add-label "changes-requested" || true
          else
            # Move to the next stage: the planner/architect produced a plan, so
            # flag it with needs-architect. Guard against duplicates (the
            # label may already be present from a prior run / manual tagging).
            if ! gh issue view "$ISSUE_NUMBER" --json labels -q '.labels[].name' | grep -qx "needs-architect"; then
              gh issue edit "$ISSUE_NUMBER" --add-label "needs-architect" || true
            fi
          fi
          fi
