name: Sync Docs

on:
  pull_request:
    types: [closed]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configure git
        run: |
          git config user.name "crewflow[bot]"
          git config user.email "crewflow[bot]@users.noreply.github.com"

      - name: Sync memory and architecture docs
        env:
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          npm install --no-save tsx >/dev/null 2>&1 || true
          npx tsx .github/scripts/update-memory.mts || true

      - name: Commit documentation updates
        run: |
          git add .ai/ docs/ || true
          if ! git diff --cached --quiet; then
            git commit -m "docs(ai): sync architecture and memory after merge"
            git push || true
          fi
