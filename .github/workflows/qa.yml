name: QA

on:
  workflow_run:
    workflows: ["Review"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  qa:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/_ai-dispatch.yml
    with:
      agent: qa
      pr-number: ${{ github.event.workflow_run.pull_requests[0].number }}
    secrets:
      AI_GITHUB_TOKEN: ${{ secrets.AI_GITHUB_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

  label:
    needs: qa
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - name: Update labels
        env:
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          gh pr edit "$PR_NUMBER" --add-label "qa" || true
