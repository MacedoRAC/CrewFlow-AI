name: Slash Commands

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: commands-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  route:
    if: >-
      github.event.issue.pull_request == null &&
      startsWith(github.event.comment.body, '/')
    runs-on: ubuntu-latest
    outputs:
      command: ${{ steps.parse.outputs.command }}
      issue: ${{ steps.parse.outputs.issue }}
      pr: ${{ steps.pr.outputs.pr }}
    steps:
      - id: parse
        env:
          COMMENT_ID: ${{ github.event.comment.id }}
          ISSUE: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Write the comment body to a FILE (not stdout): any '::' in the
          # body (e.g. a pasted review "User::factory()") must never be
          # echoed to the step log, or GitHub's workflow-command parser
          # misreads it as a command and fails the step.
          gh api "repos/$GH_REPO/issues/comments/$COMMENT_ID" --jq '.body' > /tmp/body.txt 2>/dev/null || true
          CMD=$(sed -e 's/\r$//' /tmp/body.txt | head -n1 | tr -d '"' | cut -d' ' -f1 | sed 's/^ *\///')
          echo "command=$CMD" >> "$GITHUB_OUTPUT"
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"

      - id: pr
        if: >-
          steps.parse.outputs.command == 'review'
        env:
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          ISSUE: ${{ steps.parse.outputs.issue }}
          REPO: ${{ github.repository }}
        run: |
          PR=$(gh api --paginate "search/issues?q=repo:$REPO+type:pr+$ISSUE+in:body" \
                --jq '.items[0].number' 2>/dev/null || true)
          echo "pr=${PR:-}" >> "$GITHUB_OUTPUT"

  review:
    needs: route
    if: needs.route.outputs.command == 'review' && needs.route.outputs.pr != ''
    uses: ./.github/workflows/_ai-dispatch.yml
    with:
      agent: reviewer
      pr-number: ${{ needs.route.outputs.pr }}
    secrets:
      AI_GITHUB_TOKEN: ${{ secrets.AI_GITHUB_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

  revise:
    needs: route
    if: needs.route.outputs.command == 'revise'
    uses: ./.github/workflows/_ai-dispatch.yml
    with:
      agent: revise
      issue-number: ${{ needs.route.outputs.issue }}
      comment-id: ${{ github.event.comment.id }}
    secrets:
      AI_GITHUB_TOKEN: ${{ secrets.AI_GITHUB_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

  retry:
    needs: route
    if: needs.route.outputs.command == 'retry'
    uses: ./.github/workflows/_ai-dispatch.yml
    with:
      agent: planner
      issue-number: ${{ needs.route.outputs.issue }}
    secrets:
      AI_GITHUB_TOKEN: ${{ secrets.AI_GITHUB_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

  regenerate-context:
    needs: route
    if: needs.route.outputs.command == 'regenerate-context'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - name: Regenerate context
        env:
          AI_ISSUE_NUMBER: ${{ needs.route.outputs.issue }}
        run: |
          npm install --no-save tsx >/dev/null 2>&1 || true
          npx tsx .github/scripts/collect-context.ts
      - name: Comment
        env:
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          ISSUE: ${{ needs.route.outputs.issue }}
        run: gh issue comment "$ISSUE" --body "🔄 Repository context regenerated at \`.ai/context/latest.json\`."

  summarize:
    needs: route
    if: needs.route.outputs.command == 'summarize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Post plan summary
        env:
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          ISSUE: ${{ needs.route.outputs.issue }}
        run: |
          PLAN=".ai/plans/issue-${ISSUE}.md"
          if [ -f "$PLAN" ]; then
            BODY=$(head -n 60 "$PLAN")
            printf '📋 Plan summary for #%s:\n```\n%s\n```' "$ISSUE" "$BODY" | gh issue comment "$ISSUE" --body-file -
          else
            gh issue comment "$ISSUE" --body "No plan found for #${ISSUE}. Run /analyze first."
          fi

  update-plan:
    needs: route
    if: needs.route.outputs.command == 'update-plan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Flag plan for human revision
        env:
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          ISSUE: ${{ needs.route.outputs.issue }}
        run: |
          gh issue edit "$ISSUE" --add-label "waiting-for-user" || true
          gh issue comment "$ISSUE" --body "✏️ Plan flagged for human revision. Edit .ai/plans/issue-${ISSUE}.md, then comment /implement (or /analyze to re-run the Architect)."