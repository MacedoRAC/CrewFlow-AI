name: PR Commands

# Slash commands issued as comments on a Pull Request (not an issue).
# Mirrors commands.yml but resolves the linked issue from the PR so /implement
# and /revise operate on the same plan/branch as the issue flow.

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: pr-commands-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  route:
    if: >-
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/')
    runs-on: ubuntu-latest
    outputs:
      command: ${{ steps.parse.outputs.command }}
      pr: ${{ steps.pr.outputs.pr }}
      issue: ${{ steps.issue.outputs.issue }}
    steps:
      - id: parse
        env:
          COMMENT_ID: ${{ github.event.comment.id }}
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PNUM: ${{ github.event.issue.number }}
        run: |
          # Write the comment body to a FILE (not stdout): any '::' in the
          # body (e.g. a pasted review "User::factory()") must never be
          # echoed to the step log, or GitHub's workflow-command parser
          # misreads it as a command and fails the step.
          gh api "repos/$GH_REPO/issues/comments/$COMMENT_ID" --jq '.body' > /tmp/body.txt 2>/dev/null || true
          CMD=$(sed -e 's/\r$//' /tmp/body.txt | tr -d '"' | cut -d' ' -f1 | sed 's/^ *\///')
          echo "command=$CMD" >> "$GITHUB_OUTPUT"
          echo "pr=$PNUM" >> "$GITHUB_OUTPUT"

      - id: issue
        env:
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PNUM: ${{ github.event.issue.number }}
        run: |
          # Resolve the linked issue from the PR's closing references, then the
          # branch name (issue-<n>-…), so the same plan/branch is targeted.
          # `set +e` so a failing `gh` (e.g. no closing reference yet) does
          # not abort the step; `-R` supplies the repo (no checkout here).
          set +e
          ISSUE=$(gh pr view "$PNUM" -R "$GH_REPO" --json closingIssuesReferences,headRefName \
                    -q '(.closingIssuesReferences[0].number // "")' 2>/dev/null)
          if [ -z "$ISSUE" ]; then
            BR=$(gh pr view "$PNUM" -R "$GH_REPO" --json headRefName -q '.headRefName' 2>/dev/null)
            ISSUE=$(printf '%s' "$BR" | grep -oE 'issue-[0-9]+' | grep -oE '[0-9]+' | head -1)
          fi
          echo "issue=${ISSUE:-}" >> "$GITHUB_OUTPUT"

  review:
    needs: route
    if: needs.route.outputs.command == 'review'
    uses: ./.github/workflows/_ai-dispatch.yml
    with:
      agent: reviewer
      issue-number: ${{ needs.route.outputs.issue }}
      pr-number: ${{ needs.route.outputs.pr }}
    secrets:
      AI_GITHUB_TOKEN: ${{ secrets.AI_GITHUB_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

  implement:
    needs: route
    if: needs.route.outputs.command == 'implement' && needs.route.outputs.issue != ''
    uses: ./.github/workflows/_ai-dispatch.yml
    with:
      agent: implementer
      issue-number: ${{ needs.route.outputs.issue }}
      pr-number: ${{ needs.route.outputs.pr }}
      comment-id: ${{ github.event.comment.id }}
    secrets:
      AI_GITHUB_TOKEN: ${{ secrets.AI_GITHUB_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

  revise:
    needs: route
    if: needs.route.outputs.command == 'revise' && needs.route.outputs.issue != ''
    uses: ./.github/workflows/_ai-dispatch.yml
    with:
      agent: revise
      issue-number: ${{ needs.route.outputs.issue }}
      pr-number: ${{ needs.route.outputs.pr }}
      comment-id: ${{ github.event.comment.id }}
    secrets:
      AI_GITHUB_TOKEN: ${{ secrets.AI_GITHUB_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
