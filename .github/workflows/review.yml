name: Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    uses: ./.github/workflows/_ai-dispatch.yml
    with:
      agent: reviewer
      pr-number: ${{ github.event.pull_request.number }}
    secrets:
      AI_GITHUB_TOKEN: ${{ secrets.AI_GITHUB_TOKEN }}
      OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

  label:
    needs: review
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Update labels
        env:
          GH_TOKEN: ${{ secrets.AI_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ISSUE_NUMBER=$(gh pr view "$PR_NUMBER" --json body -q '.body' | grep -oE 'Fixes #?[0-9]+|Closes #?[0-9]+|#([0-9]+)' | grep -oE '[0-9]+' | head -1 || true)
          gh pr edit "$PR_NUMBER" --add-label "needs-review" || true
          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue edit "$ISSUE_NUMBER" --add-label "needs-review" || true
          fi
