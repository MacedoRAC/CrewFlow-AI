name: "✨ Feature Request"
description: "Propose a new feature for the AI workflow to plan and implement."
title: "[Feature]: "
labels: ["needs-analysis"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know the feature is done?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend (Laravel/PHP)
        - Frontend (Vue/TypeScript)
        - API
        - Database
        - Cross-cutting
    validations:
      required: false
