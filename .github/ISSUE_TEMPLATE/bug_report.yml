name: "🐞 Bug Report"
description: "Report a defect for automatic analysis by the AI workflow."
title: "[Bug]: "
labels: ["needs-analysis"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behaviour?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend (Laravel/PHP)
        - Frontend (Vue/TypeScript)
        - API
        - Database
        - Unknown
    validations:
      required: false
